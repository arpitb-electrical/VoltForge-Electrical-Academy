<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
404 - VoltForge
</title>


<style>

/* Reset */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* Body */

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
    135deg,
    #050816,
    #0b1026);

    color:white;

    font-family:Arial, sans-serif;

}


/* Container */

.container{

    text-align:center;

    padding:40px;

}


/* Lightning */

.bolt{

    font-size:80px;

    animation:
    flash 1.5s infinite;

}


@keyframes flash{

    0%,100%{
        opacity:1;
    }

    50%{
        opacity:0.3;
    }

}


/* 404 Text */

h1{

    font-size:100px;

    color:#00e5ff;

    text-shadow:
    0 0 25px #00e5ff;

}


h2{

    font-size:32px;

    margin:20px 0;

}


p{

    color:#aaa;

    margin-bottom:30px;

    font-size:18px;

}


/* Button */

a{

    text-decoration:none;

    color:black;

    background:#00e5ff;

    padding:15px 35px;

    border-radius:30px;

    font-weight:bold;

    box-shadow:
    0 0 25px #00e5ff;

    transition:0.3s;

}


a:hover{

    transform:translateY(-5px);

    box-shadow:
    0 0 45px #00e5ff;

}


/* Mobile */

@media(max-width:768px){

    h1{
        font-size:70px;
    }

    h2{
        font-size:25px;
    }

    p{
        font-size:16px;
    }

}

</style>

</head>


<body>


<div class="container">


<div class="bolt">
⚡
</div>


<h1>
404
</h1>


<h2>
POWER FAILURE!
</h2>


<p>
Looks like the circuit is broken.
The page you are searching does not exist.
</p>


<a href="index.html">

Return To VoltForge

</a>


</div>


</body>

</html>
